<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBoard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>TaskBoard</h1>

            <div class="top-controls">
                <input type="date" id="datePicker">
                <button id="archiveButton" onclick="showArchive()">Archive</button>
                <button id="pointButton" onclick="showArchive()">...</button>
            </div>
        </header>

        <div class="add-task" id="addTaskContainer">
            <input
                type="text"
                id="todoinput"
                placeholder="New task..."
            >

            <button onclick="addTodo()">
                <p class="addTaskText">Add Task</p>
                <p class="plusText">+</p>
            </button>
        </div>

        <ul id="todoList"></ul>

        <div id="archiveContainer" class="hidden">
            <h2>Archive</h2>
            <ul id="archiveList"></ul>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
